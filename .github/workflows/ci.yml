name: QA Test Suite — Multi-Environment
 
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
 
jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Countries API tests
  # ---------------------------------------------------------------------------
  test-countries:
    name: "Countries API Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run Countries tests
        run: |
          pytest tests/test_countries.py \
            --env countries \
            --alluredir=allure-results/countries \
            --tb=short \
            -v \
            --junit-xml=reports/countries-junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}
 
      - name: Print test summary
        if: always()
        run: |
          echo "=== Countries Test Results ==="
          if [ -f reports/countries-junit.xml ]; then
            python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/countries-junit.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          if suite is not None:
              tests   = suite.get('tests', '?')
              failures = suite.get('failures', '0')
              errors   = suite.get('errors', '0')
              skipped  = suite.get('skipped', '0')
              time_val = suite.get('time', '?')
              print(f"Tests: {tests} | Failures: {failures} | Errors: {errors} | Skipped: {skipped} | Time: {time_val}s")
          EOF
          fi
 
      - name: Upload Countries raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-countries
          path: allure-results/countries/
          retention-days: 30
 
      - name: Upload Countries JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-countries
          path: reports/countries-junit.xml
          retention-days: 30
 
  # ---------------------------------------------------------------------------
  # Job 2: Weather API tests
  # ---------------------------------------------------------------------------
  test-weather:
    name: "Weather API Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run Weather tests
        run: |
          pytest tests/test_weather.py \
            --env weather \
            --alluredir=allure-results/weather \
            --tb=short \
            -v \
            --junit-xml=reports/weather-junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}
 
      - name: Print test summary
        if: always()
        run: |
          echo "=== Weather Test Results ==="
          if [ -f reports/weather-junit.xml ]; then
            python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/weather-junit.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          if suite is not None:
              tests   = suite.get('tests', '?')
              failures = suite.get('failures', '0')
              errors   = suite.get('errors', '0')
              skipped  = suite.get('skipped', '0')
              time_val = suite.get('time', '?')
              print(f"Tests: {tests} | Failures: {failures} | Errors: {errors} | Skipped: {skipped} | Time: {time_val}s")
          EOF
          fi
 
      - name: Upload Weather raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-weather
          path: allure-results/weather/
          retention-days: 30
 
      - name: Upload Weather JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-weather
          path: reports/weather-junit.xml
          retention-days: 30
 
  # ---------------------------------------------------------------------------
  # Job 3: Aggregate results — Combine raw results,
  # run quality gate, generate one Allure HTML report, deploy to Pages.
  # ---------------------------------------------------------------------------
  report-and-gate:
    name: "Combined Report + Quality Gate"
    runs-on: ubuntu-latest
    needs: [test-countries, test-weather]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
 
      - name: Download Countries raw Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-countries
          path: allure-results/all
 
      - name: Download Weather raw Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-weather
          path: allure-results/all
 
      - name: Download Countries JUnit report
        uses: actions/download-artifact@v4
        with:
          name: junit-countries
          path: reports
 
      - name: Download Weather JUnit report
        uses: actions/download-artifact@v4
        with:
          name: junit-weather
          path: reports
 
      - name: Quality gate check (aggregated)
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          import glob, sys
 
          total = dict(tests=0, failures=0, errors=0, skipped=0)
          for path in sorted(glob.glob('reports/*-junit.xml')):
              tree = ET.parse(path)
              root = tree.getroot()
              suite = root if root.tag == 'testsuite' else root.find('testsuite')
              if suite is None:
                  print(f"WARNING: Could not parse {path}")
                  continue
              for k in total:
                  total[k] += int(suite.get(k, 0))
              print(f"Parsed {path}: tests={suite.get('tests')} failures={suite.get('failures')} errors={suite.get('errors')}")
 
          passed = total['tests'] - total['failures'] - total['errors'] - total['skipped']
          print("=" * 50)
          print("QUALITY GATE REPORT (aggregated)")
          print("=" * 50)
          print(f"  Total Tests : {total['tests']}")
          print(f"  Passed      : {passed}")
          print(f"  Failed      : {total['failures']}")
          print(f"  Errors      : {total['errors']}")
          print(f"  Skipped     : {total['skipped']}")
          print("=" * 50)
          if total['failures'] > 0 or total['errors'] > 0:
              print(f"QUALITY GATE FAILED: {total['failures']} failure(s), {total['errors']} error(s)")
              sys.exit(1)
          print("QUALITY GATE PASSED: All tests green")
          EOF
 
      - name: Generate combined Allure report
        if: always()
        run: allure generate allure-results/all -o allure-report/combined --clean
 
      - name: Upload combined Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/combined/
          retention-days: 30
 
      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report/combined