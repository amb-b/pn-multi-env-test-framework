name: QA Test Suite — Multi-Environment

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Countries API tests
  # ---------------------------------------------------------------------------
  test-countries:
    name: "Countries API Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run Countries tests
        run: |
          pytest tests/test_countries.py \
            --env countries \
            --alluredir=allure-results/countries \
            --tb=short \
            -v \
            --junit-xml=reports/countries-junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Print test summary
        if: always()
        run: |
          echo "=== Countries Test Results ==="
          if [ -f reports/countries-junit.xml ]; then
            python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/countries-junit.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          if suite is not None:
              tests   = suite.get('tests', '?')
              failures = suite.get('failures', '0')
              errors   = suite.get('errors', '0')
              skipped  = suite.get('skipped', '0')
              time_val = suite.get('time', '?')
              print(f"Tests: {tests} | Failures: {failures} | Errors: {errors} | Skipped: {skipped} | Time: {time_val}s")
          EOF
          fi

      - name: Generate Allure report (Countries)
        if: always()
        run: allure generate allure-results/countries -o allure-report/countries --clean

      - name: Upload Countries Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-countries
          path: allure-report/countries/
          retention-days: 30

      - name: Upload Countries JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-countries
          path: reports/countries-junit.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Weather API tests
  # ---------------------------------------------------------------------------
  test-weather:
    name: "Weather API Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run Weather tests
        run: |
          pytest tests/test_weather.py \
            --env weather \
            --alluredir=allure-results/weather \
            --tb=short \
            -v \
            --junit-xml=reports/weather-junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Print test summary
        if: always()
        run: |
          echo "=== Weather Test Results ==="
          if [ -f reports/weather-junit.xml ]; then
            python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/weather-junit.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          if suite is not None:
              tests   = suite.get('tests', '?')
              failures = suite.get('failures', '0')
              errors   = suite.get('errors', '0')
              skipped  = suite.get('skipped', '0')
              time_val = suite.get('time', '?')
              print(f"Tests: {tests} | Failures: {failures} | Errors: {errors} | Skipped: {skipped} | Time: {time_val}s")
          EOF
          fi

      - name: Generate Allure report (Weather)
        if: always()
        run: allure generate allure-results/weather -o allure-report/weather --clean

      - name: Upload Weather Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-weather
          path: allure-report/weather/
          retention-days: 30

      - name: Upload Weather JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-weather
          path: reports/weather-junit.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Full suite (both environments) + combined report + quality gate
  # ---------------------------------------------------------------------------
  test-all-and-quality-gate:
    name: "Full Suite + Quality Gate"
    runs-on: ubuntu-latest
    needs: [test-countries, test-weather]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run full test suite (both environments)
        run: |
          pytest tests/ \
            --alluredir=allure-results/all \
            --tb=short \
            -v \
            --junit-xml=reports/all-junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Quality gate check
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          import sys

          tree = ET.parse('reports/all-junit.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')

          if suite is None:
              print("ERROR: Could not parse test results")
              sys.exit(1)

          tests    = int(suite.get('tests', 0))
          failures = int(suite.get('failures', 0))
          errors   = int(suite.get('errors', 0))
          skipped  = int(suite.get('skipped', 0))
          passed   = tests - failures - errors - skipped

          print("=" * 50)
          print("QUALITY GATE REPORT")
          print("=" * 50)
          print(f"  Total Tests : {tests}")
          print(f"  Passed      : {passed}")
          print(f"  Failed      : {failures}")
          print(f"  Errors      : {errors}")
          print(f"  Skipped     : {skipped}")
          print("=" * 50)

          if failures > 0 or errors > 0:
              print(f"QUALITY GATE FAILED: {failures} failure(s), {errors} error(s)")
              sys.exit(1)
          else:
              print("QUALITY GATE PASSED: All tests green")
          EOF

      - name: Generate combined Allure report
        if: always()
        run: allure generate allure-results/all -o allure-report/combined --clean

      - name: Upload combined Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/combined/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report/combined

      - name: Upload combined JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-all
          path: reports/all-junit.xml
          retention-days: 30