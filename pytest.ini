[pytest]
# -----------------------------------------------------------------------
# PANW QA Framework — pytest configuration
# -----------------------------------------------------------------------

# Default test discovery
testpaths = tests

# Output verbosity
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (prevents PytestUnknownMarkWarning)
markers =
    countries: Tests targeting the REST Countries API environment
    weather:   Tests targeting the Open-Meteo Weather API environment

# Log settings
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Maximum line length (matches code-style.md)
# (enforced via flake8/ruff in pre-commit, not pytest itself)
